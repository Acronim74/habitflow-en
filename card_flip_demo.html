<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HabitFlow — демо флипа карточки (180°)</title>
  <style>
    :root {
      --surface: #fff;
      --border: #e8e8e0;
      --accent: #2d6a4f;
      --bonus: #d4a017;
      --text1: #1a1a1a;
      --text3: #888;
      --r-lg: 14px;
      --r-md: 11px;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a;
      color: #fff;
      min-height: 100vh;
      margin: 0;
      padding: 32px 20px;
    }
    h1 { font-size: 14px; font-weight: 600; margin: 0 0 8px; opacity: 0.9; }
    p.note { font-size: 12px; color: #888; margin: 0 0 20px; max-width: 420px; line-height: 1.5; }
    .demo-row { margin-bottom: 40px; }
    .toggle {
      margin-top: 16px;
      padding: 10px 18px;
      border-radius: var(--r-md);
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 13px;
      cursor: pointer;
    }
    .toggle:hover { opacity: 0.9; }

    /* ── как в приложении: флип ───────────────── */
    .hcard-flip-wrap {
      perspective: 900px;
      max-width: 400px;
    }

    .hcard {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--r-lg);
      position: relative;
      cursor: pointer;
      user-select: none;
      transform-style: preserve-3d;
      transition: transform 3.2s cubic-bezier(0.19, 1, 0.22, 1),
                  border-color 0.5s ease;
      min-height: 72px;
      height: auto;
      overflow: visible;
    }

    .hcard.hc-done {
      transform: rotateY(180deg);
      opacity: 1;
    }

    .hcard-front {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      background: var(--surface);
      border-radius: var(--r-lg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .hcard-back {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      transform: rotateY(180deg);
      background: var(--accent);
      border-radius: var(--r-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 0 16px;
    }

    .hcard-row {
      display: flex;
      align-items: stretch;
      min-height: 68px;
      flex: 1;
    }
    .hcard-body {
      flex: 1;
      padding: 11px 13px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 3px;
    }
    .hcard-top { display: flex; align-items: center; gap: 8px; }
    .hcard-name { font-size: 13px; font-weight: 500; color: var(--text1); }
    .hcard-sub { font-size: 11px; color: var(--text3); padding-left: 25px; }
    .hcard-check-zone {
      width: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-left: 0.5px solid var(--border);
    }
    .hcard-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1.5px solid #d0d0c8;
    }
    .hcard-bar-track { height: 2px; background: var(--border); }

    .hcard-back-ico { font-size: 22px; color: white; flex-shrink: 0; }
    .hcard-back-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
      min-width: 0;
    }
    .hcard-back-title { font-size: 13px; font-weight: 500; color: white; }
    .hcard-back-time { font-size: 11px; color: rgba(255,255,255,.65); }
    .hcard-back-undo {
      font-size: 11px;
      color: rgba(255,255,255,.5);
      cursor: pointer;
      padding: 4px 10px;
      border: 0.5px solid rgba(255,255,255,.25);
      border-radius: var(--r-md);
      background: transparent;
      white-space: nowrap;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div class="demo-row">
    <h1>180° Flip — эталон (как в приложении)</h1>
    <p class="note">
      Плавный поворот вокруг Y, видна «толщина» переворота за счёт <code>perspective</code>
      и <code>overflow: visible</code> на карточке. Нажми круг справа или кнопку ниже.
    </p>
    <div class="hcard-flip-wrap">
      <div class="hcard" id="demoCard">
        <div class="hcard-front">
          <div class="hcard-row" onclick="toggleDemo()">
            <div class="hcard-body">
              <div class="hcard-top">
                <span>📖</span>
                <span class="hcard-name">Читать 20 минут</span>
              </div>
              <div class="hcard-sub">Нет стрика</div>
            </div>
            <div class="hcard-check-zone" onclick="event.stopPropagation(); toggleDemo()">
              <div class="hcard-btn"></div>
            </div>
          </div>
          <div class="hcard-bar-track"></div>
        </div>
        <div class="hcard-back">
          <div class="hcard-back-ico">✓</div>
          <div class="hcard-back-info">
            <div class="hcard-back-title">Выполнено!</div>
            <div class="hcard-back-time" id="demoTime">—</div>
          </div>
          <button type="button" class="hcard-back-undo" onclick="toggleDemo()">отменить</button>
        </div>
      </div>
    </div>
    <button type="button" class="toggle" onclick="toggleDemo()">Переключить выполнено</button>
  </div>

  <script>
    function toggleDemo() {
      const card = document.getElementById('demoCard');
      const on = card.classList.toggle('hc-done');
      document.getElementById('demoTime').textContent = on
        ? new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' })
        : '—';
    }
  </script>
</body>
</html>
